name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: Lint, type-check, test & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type-check
        run: bunx tsc --noEmit

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build
        env:
          # NEXT_PUBLIC_ vars are embedded at build time — provide stubs so
          # any component that references them doesn't produce undefined output.
          # Server-side vars are skipped at build time via the NEXT_PHASE check
          # in src/lib/env.ts — no stubs needed for those.
          NEXT_PUBLIC_SITE_URL: https://jsquaredadventures.com
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_anon_key_ci_only

      # 6.S.3 / 6.CI.3: dependency vulnerability scan — fail on high/critical CVEs
      - name: Audit dependencies
        run: bun audit --audit-level=high

  dependency-scan:
    name: Dependency scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: "fs"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          exit-code: "1"

  # 6.S.4: secrets scanning — runs on every push/PR to catch accidental credential commits
  secrets-scan:
    name: Secrets scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 6.CI.2: SAST — static analysis for OWASP Top 10 patterns
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Semgrep scan
        run: semgrep scan --config p/owasp-top-ten --config p/typescript --error
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
