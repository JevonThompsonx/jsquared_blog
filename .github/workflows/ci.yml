name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TURSO_DATABASE_URL: https://test-db.turso.io
  TURSO_AUTH_TOKEN: test-token
  AUTH_SECRET: test-secret-minimum-32-characters!!
  AUTH_GITHUB_ID: test-id
  AUTH_GITHUB_SECRET: test-secret
  CLOUDINARY_CLOUD_NAME: test
  CLOUDINARY_API_KEY: test-key
  CLOUDINARY_API_SECRET: test-secret
  SUPABASE_URL: https://test.supabase.co
  SUPABASE_ANON_KEY: test-key
  CRON_SECRET: test-cron-secret-min-16
  NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: test-key
  NEXT_PUBLIC_SITE_URL: http://localhost:3000
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SENTRY_RELEASE: ${{ github.sha }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web run lint

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web exec tsc --noEmit

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web run test

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web exec playwright install --with-deps chromium
      - run: pnpm --filter web run test:e2e
