name: Lighthouse CI

# 6.CI.1: Run Lighthouse against the Vercel preview URL after each deployment.
# Fails the check if Performance < 90 or Accessibility < 95.
#
# Prerequisites (set in repo secrets):
#   LHCI_GITHUB_APP_TOKEN              — Lighthouse CI GitHub App token for PR status checks
#   VERCEL_AUTOMATION_BYPASS_SECRET    — Vercel "Protection Bypass for Automation" secret
#                                        (Project Settings → Security → Protection Bypass for Automation)
#
# Without VERCEL_AUTOMATION_BYPASS_SECRET every request redirects to vercel.com/login
# and Lighthouse audits the login page instead of your app.

on:
  deployment_status:

jobs:
  lighthouse:
    name: Lighthouse audit
    runs-on: ubuntu-latest
    # Only run when Vercel deployment succeeds
    if: github.event.deployment_status.state == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install @lhci/cli
        run: npm install -g @lhci/cli

      - name: Run Lighthouse CI
        run: |
          lhci autorun \
            --collect.url="${{ github.event.deployment_status.target_url }}" \
            --collect.url="${{ github.event.deployment_status.target_url }}/about" \
            --collect.settings.extraHeaders='{"x-vercel-protection-bypass":"${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}"}'
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
